<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hospital Procedure Scheduler</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Hospital Procedure Scheduler</h3>
        </div>

        <div class="card-body">

            <form id="scheduleForm">

                <div class="row g-3">

                    <!-- Date Called -->
                    <div class="col-md-4">
                        <label class="form-label">Date Called</label>
                        <input type="date" class="form-control" id="dateCalled" required>
                    </div>

                    <!-- Room -->
                    <div class="col-md-4">
                        <label class="form-label">Room</label>
                        <select class="form-select" id="room" required>
                            <option value="">Select Room</option>
                            <option>CT Scan Room</option>
                            <option>MRI Room</option>
                            <option>X-Ray Room</option>
                            <option>Ultrasound Room</option>
                            <option>Fluoroscopy Room</option>
                            <option>Cath Lab</option>
                            <option>Operating Room 1</option>
                            <option>Operating Room 2</option>
                        </select>
                    </div>

                    <!-- Hospital Number -->
                    <div class="col-md-4">
                        <label class="form-label">Hospital Number</label>
                        <input type="text" class="form-control" id="hospitalNo" placeholder="Enter Hospital Number">
                    </div>

                    <!-- Procedure -->
                    <div class="col-md-6">
                        <label class="form-label">Procedure</label>
                        <input type="text" class="form-control" id="procedure" placeholder="Enter Procedure">
                    </div>

                    <!-- Schedule -->
                    <div class="col-md-6">
                        <label class="form-label">Schedule (Date & Time)</label>
                        <input type="datetime-local" class="form-control" id="schedule">
                    </div>

                    <!-- Doctor -->
                    <div class="col-md-4">
                        <label class="form-label">Doctor / Case</label>
                        <input type="text" class="form-control" id="doctor" placeholder="Doctor Name">
                    </div>

                    <!-- C/O -->
                    <div class="col-md-4">
                        <label class="form-label">C/O</label>
                        <input type="text" class="form-control" id="co" placeholder="Care Of">
                    </div>

                    <!-- RadTech -->
                    <div class="col-md-4">
                        <label class="form-label">RadTech</label>
                        <input type="text" class="form-control" id="radtech" placeholder="Radiologic Technologist">
                    </div>

                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success">
                        Save Schedule
                    </button>

                    <button type="reset" class="btn btn-secondary">
                        Clear
                    </button>
                </div>

            </form>

        </div>
    </div>

    <!-- Schedule Table -->
    <div class="card mt-4 shadow">
        <div class="card-header bg-dark text-white">
            Scheduled Procedures
        </div>

        <div class="card-body table-responsive">

            <table class="table table-bordered table-striped text-center">
                <thead class="table-primary">
                    <tr>
                        <th>Date Called</th>
                        <th>Room</th>
                        <th>Hospital No.</th>
                        <th>Procedure</th>
                        <th>Schedule</th>
                        <th>Doctor/Case</th>
                        <th>C/O</th>
                        <th>RadTech</th>
                    </tr>
                </thead>

                <tbody id="scheduleTable">
                </tbody>

            </table>

        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
